<!-- Legacy template: *ngIf with an else template. -->
<div class="task-detail" *ngIf="task as t; else empty">
  <h2>{{ t.title }}</h2>
  <dl>
    <dt>Status</dt>
    <dd>{{ t.status }}</dd>
    <dt>Assignee</dt>
    <dd>{{ t.assignee }}</dd>
  </dl>
</div>

<ng-template #empty>
  <p>Select a task to see its details.</p>
</ng-template>
