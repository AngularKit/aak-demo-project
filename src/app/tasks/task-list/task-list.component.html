<!-- VIDÉO 1 — legacy template: *ngIf / *ngFor WITHOUT track. -->
<div class="task-list">
  <input #search type="text" placeholder="Search tasks..." (input)="onSearch()" />

  <p *ngIf="loading">Loading tasks...</p>

  <ul *ngIf="!loading">
    <li
      *ngFor="let task of filteredTasks"
      (click)="onSelect(task)"
      [class.done]="task.status === 'done'"
    >
      <span class="title">{{ task.title }}</span>
      <span class="status">{{ task.status }}</span>
      <span class="assignee">{{ task.assignee }}</span>
    </li>
  </ul>

  <p *ngIf="!loading && filteredTasks.length === 0">No tasks match.</p>
</div>
